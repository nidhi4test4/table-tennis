name: Deploy to GitHub Pages

on:
  # Runs on every push to main branch (e.g. when HTML files are updated)
  push:
    branches:
      - main

  # Runs on a schedule every 6 hours so Google Sheets data changes
  # are reflected in a fresh deployment even without a code push
  schedule:
    - cron: '0 */6 * * *'

  # Allows manual trigger from the Actions tab
  workflow_dispatch:

# Sets permissions required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repository root (contains index.html, certificate.html)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
